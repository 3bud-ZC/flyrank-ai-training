<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Abdullah Ragab — Portfolio Build</title>
  <meta name="description" content="A live placeholder for Abdullah Ragab's portfolio build." />
  <style>
    :root { --main:#0F766E; --text:#111827; --bg:#F9FAFB; --accent:#F59E0B; }
    * { box-sizing:border-box; }
    html, body { margin:0; min-height:100%; }
    body { min-height:100vh; display:grid; place-items:center; padding:24px; background:var(--bg); color:var(--text); font-family:Inter,Arial,sans-serif; }
    main { width:min(720px,100%); padding:48px 32px; border:1px solid rgba(17,24,39,.14); border-radius:20px; text-align:center; background:#fff; }
    .mark { width:48px; height:48px; margin:0 auto 24px; display:grid; place-items:center; border-radius:12px; background:var(--main); color:var(--bg); font-weight:700; letter-spacing:.04em; }
    h1 { margin:0; font-family:"Space Grotesk",Inter,Arial,sans-serif; font-size:clamp(2rem,7vw,4rem); line-height:1; }
    p { max-width:520px; margin:20px auto 0; line-height:1.65; font-size:1.05rem; }
    .status { display:inline-flex; gap:8px; align-items:center; margin-top:28px; padding:8px 12px; border-radius:999px; background:rgba(15,118,110,.09); color:var(--main); font-weight:600; font-size:.9rem; }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">AR</div>
    <h1>Abdullah Ragab</h1>
    <p>This portfolio build is live. The full content, case studies, identity system, and conversion path will be added in the next iteration.</p>
    <div class="status"><span class="dot"></span>Empty but live</div>
  </main>
</body>
</html>
